<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Forensic Terminal V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #cbd5e1; font-family: 'monospace'; }
        .grid-box { border: 1px solid #1e293b; background: #0f172a; padding: 15px; border-radius: 4px; }
        .label { font-size: 10px; color: #64748b; text-transform: uppercase; margin-bottom: 4px; }
        .val { font-weight: bold; font-size: 16px; color: #38bdf8; }
        .pass { color: #4ade80; } .fail { color: #f87171; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-7xl mx-auto">
        <div class="flex gap-4 mb-8">
            <input type="text" id="ticker" placeholder="TICKER" class="bg-slate-900 border border-slate-700 p-3 rounded w-64 outline-none uppercase">
            <button onclick="scan()" class="bg-blue-600 px-10 py-3 rounded font-bold hover:bg-blue-500 transition">RUN_FORENSIC_SCAN</button>
        </div>

        <div id="terminal" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4">
            </div>
    </div>

    <script>
        const API = "https://forensic-stock-terminal.onrender.com/api/analyze/";

        async function scan() {
            const ticker = document.getElementById('ticker').value;
            const container = document.getElementById('terminal');
            container.innerHTML = "<div class='col-span-full animate-pulse'>SCRAPING_DEEP_DATA... PLEASE_WAIT...</div>";

            try {
                const res = await fetch(API + ticker);
                const d = await res.json();

                container.innerHTML = `
                    <div class="grid-box border-blue-500/50"><div class="label">Ticker / Price</div><div class="text-2xl font-bold text-white">${d.ticker}</div><div class="text-xl text-yellow-400">${d.price}</div></div>
                    <div class="grid-box"><div class="label">Business Segment</div><div class="text-xs">${d.businessSegment}</div></div>
                    <div class="grid-box"><div class="label">ROCE / PEG</div><div class="val">${d.quickSnapshot.roce}</div><div class="text-xs">PEG: ${d.quickSnapshot.peg}</div></div>
                    <div class="grid-box"><div class="label">Forensic Status</div><div class="val ${d.forensic18.status === 'PASS' ? 'pass' : 'fail'}">${d.forensic18.status}</div></div>
                    <div class="grid-box"><div class="label">Multibagger Score</div><div class="val text-purple-400">${d.multibagger25.score}/25</div><div class="text-xs">${d.multibagger25.status}</div></div>
                    <div class="grid-box"><div class="label">CFO Audit</div><div class="text-sm font-bold text-green-400">${d.cfoAudit.cfoVsPat}</div></div>
                    <div class="grid-box"><div class="label">Promoter Intel</div><div class="val">${d.shareholding.promoter}</div><div class="text-xs">D/E: ${d.quickSnapshot.de}</div></div>
                    <div class="grid-box"><div class="label">Order Book / Guidance</div><div class="text-[10px]">${d.guidanceTracker}</div></div>
                    <div class="grid-box"><div class="label">Intrinsic Value</div><div class="val">${d.intrinsicValue}</div></div>
                    <div class="grid-box"><div class="label">Efficiency Matrix</div><div class="text-sm">Days: ${d.efficiencyMatrix.debtorDays}</div></div>
                    <div class="grid-box"><div class="label">Truth Serum</div><div class="text-xs italic text-blue-300">${d.truthSerum}</div></div>
                    <div class="grid-box border-green-900"><div class="label">Final Verdict</div><div class="text-[11px] text-green-200">${d.finalVerdictItems.join(" • ")}</div></div>
                `;
            } catch (e) { container.innerHTML = "OFFLINE_OR_ERROR"; }
        }
    </script>
</body>
</html>
